# Proxmox VE on AlmaLinux — Package build definitions
#
# Each entry defines a PVE package to build in the CI pipeline.
# The workflow iterates over this list and auto-assigns build waves
# based on depends_on topology and layer ordering.
#
# To add a new package:
#   1. Add an entry below with a unique id
#   2. Create packages/<id>/build.sh with the build logic
#   3. Commit and push — the CI will build it automatically
#
# Fields:
#   id              — Unique identifier (must match packages/<id>/build.sh)
#   repo            — Git repository URL on git.proxmox.com
#   version_source  — How to get the version: git (fetch from git.proxmox.com) | hash-only
#   build_time      — Estimated build time in minutes (for wave scheduling info)
#   depends_on      — List of package ids that must build before this one (optional)
#   artifact_type   — Output type: pkg (default, .pkg.tar intermediate)
#   layer           — Build layer (0–7) from the porting plan dependency graph

packages:
  # ============================================================================
  # Layer 0 — Perl Leaf Modules (no PVE deps)
  # ============================================================================
  # CPAN-sourced Perl modules with no PVE-internal dependencies.
  # These are the first packages built and are consumed by Layer 2+.

